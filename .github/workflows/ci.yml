name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: fastapi-app/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Lint Python
        run: python -m pip install flake8==7.1.2 && python -m flake8 .

      - name: Run tests
        run: python -m pytest -v

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint frontend
        run: npx eslint src --ext .js,.jsx --max-warnings 0

      - name: Build frontend
        run: npm run build

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${IMAGE_TAG} \
            -t ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest \
            ./fastapi-app

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:${IMAGE_TAG} \
            -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest \
            ./frontend

      - name: Build nginx proxy image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:${IMAGE_TAG} \
            -t ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest \
            ./nginx

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest

      - name: Push nginx proxy image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:${IMAGE_TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}' DOCKER_PASSWORD='${{ secrets.DOCKER_PASSWORD }}' ./deploy.sh ${IMAGE_TAG}
